          min: 1
          max: 1
        participation: "mandatory"
        identifying: false
        notes: ""
    relationship_attributes: []
    constraints:
      cardinality_class: "one_to_many"
      is_functional: true
      functional_from: "Order"
      functional_to: "Customer"
      requires_relationship_table: false
