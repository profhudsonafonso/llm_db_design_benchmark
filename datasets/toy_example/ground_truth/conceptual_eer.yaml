    description: "A customer places zero or more orders. Each order belongs to exactly one customer."
    source_artifacts: []
    aliases: ["places"]
    participants:
      - entity: "Customer"
        role: "customer"
        cardinality:
          min: 0
          max: "many"
        participation: "optional"
        identifying: false
        notes: ""
      - entity: "Order"
        role: "order"
